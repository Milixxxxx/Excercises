
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BreathPulse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500;600&family=Crimson+Text:ital@1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sage: '#9CAF88',
            beige: '#E8DCC4',
            darkBlue: '#4A5F7A',
            mauve: '#B4869F',
            terracotta: '#C97B63',
            mint: '#B8D8BA',
            mainText: '#2C3E50',
            bgLight: '#FDFBF7',
            bgDark: '#3D4F5C'
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Poppins', 'sans-serif'],
            serif: ['Crimson Text', 'serif']
          },
          animation: {
            'pulse-slow': 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'balloon-pulse': 'balloonPulse 0.8s ease-in-out infinite'
          },
          keyframes: {
            balloonPulse: {
              '0%, 100%': { transform: 'scale(1)' },
              '50%': { transform: 'scale(1.05)' }
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #FDFBF7;
      color: #2C3E50;
      margin: 0;
      font-family: 'Inter', sans-serif;
    }
    .balloon-transition {
      transition: transform cubic-bezier(0.4, 0, 0.2, 1);
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
